services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env.example
    depends_on: [db, redis, minio]
    restart: unless-stopped

  worker:
    build: .
    command: celery -A app.tasks.celery_app worker -l info --concurrency=4 --pool=prefork
    env_file: .env.example
    depends_on: [redis, db]
    restart: unless-stopped

  scheduler:
    build: .
    command: celery -A app.tasks.celery_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env.example
    depends_on: [redis, db]
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gst_engine
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    depends_on: [api]
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  pgdata: {}
  redisdata: {}
  miniodata: {}