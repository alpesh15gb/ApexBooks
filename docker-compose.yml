services:
  api:
    build: .
    env_file: .env
    depends_on: [db, redis, minio]
    restart: unless-stopped
    volumes:
      - jwt_keys:/run/secrets:ro
    # Expose API on localhost ONLY — not on public IP
    # System nginx proxies api.apexbooks.in → 127.0.0.1:8000
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - gst-net
    command: >
      sh -c "python -m alembic upgrade head &&
             python scripts/seed_settings.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  worker:
    build: .
    command: celery -A app.tasks.celery_app worker -l info --concurrency=4 --pool=prefork
    env_file: .env
    depends_on: [redis, db]
    restart: unless-stopped
    networks:
      - gst-net

  scheduler:
    build: .
    command: celery -A app.tasks.celery_app beat -l info
    env_file: .env
    depends_on: [redis, db]
    restart: unless-stopped
    networks:
      - gst-net

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gst_engine
    # NO host port — only accessible inside Docker network
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - gst-net

  redis:
    image: redis:7-alpine
    # NO host port — only accessible inside Docker network
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - gst-net

  minio:
    image: minio/minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    # Console accessible on 9001 for manual file management
    ports:
      - "127.0.0.1:9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped
    networks:
      - gst-net

volumes:
  pgdata: {}
  redisdata: {}
  miniodata: {}
  jwt_keys: {}

networks:
  gst-net:
    driver: bridge