# Upstream: API server
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

upstream api_backend {
    server 127.0.0.1:8000;
}

# ========== API: api.apexbooks.in ==========
server {
    listen 80;
    listen [::]:80;
    server_name api.apexbooks.in;

    # Rate limiting usage
    limit_req zone=api_limit burst=50 nodelay;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API proxy
    location / {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
    }

    # Health check (for load balancer / monitoring)
    location /health {
        proxy_pass http://api_backend/health;
        access_log off;
    }

    # Keep-alive for WebSocket connections (if needed later)
    location /ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    access_log /var/log/nginx/api_access.log;
    error_log  /var/log/nginx/api_error.log warn;
}

# ========== Frontend: apexbooks.in ==========
server {
    listen 80;
    listen [::]:80;
    server_name apexbooks.in www.apexbooks.in;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /opt/gst-api-engine/frontend;
    index index.html;

    # SPA routing — serve index.html for all non-file paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy from frontend domain to backend
    # Frontend JS calls /api/v1/... → proxied to API container
    location /api/ {
        proxy_pass http://api_backend/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Caching for static assets (JS/CSS/fonts/images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/frontend_access.log;
    error_log  /var/log/nginx/frontend_error.log warn;
}

# ========== Redirect: www.apexbooks.in → apexbooks.in ==========
server {
    listen 80;
    listen [::]:80;
    server_name www.apexbooks.in;
    return 301 https://apexbooks.in$request_uri;
}

# ========== Redirect: default → API ==========
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    return 444;  # Silent drop
}